name: Bug Report
description: Report bugs or issues
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

  - type: checkboxes
    attributes:
      label: Check existing issues
      options:
        - label: I checked there isn't already an issue for this bug.
          required: true

  - type: input
    id: version
    attributes:
      label: hl-terminal version
      description: Run `hl-terminal --version` to find out.
      placeholder: 0.2.0
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Bun
        - Node.js
        - Other
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      description: Output of `bun --version` or `node --version`.
      placeholder: 1.2.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands or steps to reproduce the behavior.
      placeholder: |
        1. Run `hl-terminal price BTC`
        2. Observe error...
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Error output, screenshots, network (mainnet/testnet), etc.
    validations:
      required: false
